# ── Customer Telegram Mini App — hostname publik terpisah (TANPA Cloudflare Access) ──
# Host ini hanya menyajikan mini app + asetnya + API /api/miniapp + foto /uploads.
# Admin CMS sengaja TIDAK diekspos di sini (lihat server default di bawah).
server {
  listen 80;
  server_name dev-app.deedims.biz.id app.deedims.biz.id;
  root /usr/share/nginx/html;

  # API customer mini app (same-origin → tanpa CORS)
  location /api/miniapp/ {
    proxy_pass http://backend:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 6m;
  }

  # API admin lain tidak boleh diakses dari host publik
  location /api/ { return 404; }

  # Foto menu (disajikan backend dari volume)
  location /uploads/ {
    proxy_pass http://backend:3000;
    proxy_set_header Host $host;
  }

  # Jangan sajikan shell admin di host publik
  location = /index.html { return 404; }

  # Root → mini app (entry miniapp.html); aset statis /assets/* dilayani apa adanya
  location / {
    try_files $uri /miniapp.html;
  }
}

# ── Admin CMS — host default (di balik Cloudflare Access) ──
server {
  listen 80 default_server;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Proxy API ke backend (same-origin → tak perlu CORS dari browser)
  location /api/ {
    proxy_pass http://backend:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 6m;            # selaras MAX_UPLOAD_MB backend
  }

  # Foto menu yang di-upload (disajikan backend dari volume)
  location /uploads/ {
    proxy_pass http://backend:3000;
    proxy_set_header Host $host;
  }

  # SPA fallback admin CMS — semua route lain diserahkan ke index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}
