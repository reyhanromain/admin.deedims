server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Proxy API ke backend (same-origin → tak perlu CORS dari browser)
  location /api/ {
    proxy_pass http://backend:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 6m;            # selaras MAX_UPLOAD_MB backend
  }

  # Foto menu yang di-upload (disajikan backend dari volume)
  location /uploads/ {
    proxy_pass http://backend:3000;
    proxy_set_header Host $host;
  }

  # SPA fallback — semua route diserahkan ke index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}
