name: Deploy and promote

on:
  push:
    branches:
      - dev
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy ${{ github.ref_name == 'dev' && 'staging' || 'production' }}
    runs-on:
      - self-hosted
      - Linux
      - X64
      - deedims-deploy
    environment: ${{ github.ref_name == 'dev' && 'staging' || 'production' }}
    steps:
      - name: Check out protected branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          clean: true

      - name: Attach checkout to protected branch
        run: git switch -C "$GITHUB_REF_NAME" "origin/$GITHUB_REF_NAME"

      - name: Rebuild and verify deployment
        run: scripts/deploy.sh "${{ github.ref_name == 'dev' && 'staging' || 'prod' }}"

  promote:
    name: Promote tested branch to main
    if: github.ref_name == 'dev'
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Open production PR from the tested change branch
        env:
          GH_TOKEN: ${{ secrets.DEEDIMS_AUTOMATION_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          MERGE_SHA: ${{ github.sha }}
        run: |
          head_branch=$(gh api \
            -H 'Accept: application/vnd.github+json' \
            "repos/$REPOSITORY/commits/$MERGE_SHA/pulls" \
            --jq 'map(select(.base.ref == "dev" and .merged_at != null))[0].head.ref // empty')

          if [ -z "$head_branch" ] || [ "$head_branch" = "main" ]; then
            echo 'No change branch requires production promotion.'
            exit 0
          fi

          existing=$(gh pr list --repo "$REPOSITORY" --base main --head "$head_branch" --state open --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            pr_number="$existing"
          else
            pr_url=$(gh pr create \
              --repo "$REPOSITORY" \
              --base main \
              --head "$head_branch" \
              --title "promote: $head_branch to production" \
              --body "Automated production promotion after the exact change-branch head was merged into dev and the staging deployment passed.")
            pr_number=${pr_url##*/}
          fi

          gh pr merge "$pr_number" --repo "$REPOSITORY" --auto --merge

  sync-dev:
    name: Synchronize production baseline to dev
    if: github.ref_name == 'main'
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Open main-to-dev synchronization PR when needed
        env:
          GH_TOKEN: ${{ secrets.DEEDIMS_AUTOMATION_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          ahead=$(gh api "repos/$REPOSITORY/compare/dev...main" --jq '.ahead_by')
          if [ "$ahead" -eq 0 ]; then
            echo 'dev already contains the production baseline.'
            exit 0
          fi

          existing=$(gh pr list --repo "$REPOSITORY" --base dev --head main --state open --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            pr_number="$existing"
          else
            pr_url=$(gh pr create \
              --repo "$REPOSITORY" \
              --base dev \
              --head main \
              --title 'chore: synchronize production baseline to dev' \
              --body 'Automated synchronization after production deployment. This never promotes unrelated dev changes into main.')
            pr_number=${pr_url##*/}
          fi

          gh pr merge "$pr_number" --repo "$REPOSITORY" --auto --merge
