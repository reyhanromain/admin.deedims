name: Deploy and promote

on:
  push:
    branches:
      - dev
      - main
  pull_request_target:
    branches:
      - dev
    types:
      - labeled
  workflow_dispatch:
    inputs:
      change_branch:
        description: Change branch already merged and UAT-passed in dev
        required: true

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: deploy-${{ github.ref_name }}-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy ${{ github.ref_name == 'dev' && 'staging' || 'production' }}
    if: github.event_name == 'push'
    runs-on:
      - self-hosted
      - Linux
      - X64
      - deedims-deploy
    environment: ${{ github.ref_name == 'dev' && 'staging' || 'production' }}
    steps:
      - name: Check out protected branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          clean: true

      - name: Attach checkout to protected branch
        run: git switch -C "$GITHUB_REF_NAME" "origin/$GITHUB_REF_NAME"

      - name: Rebuild and verify deployment
        run: scripts/deploy.sh "${{ github.ref_name == 'dev' && 'staging' || 'prod' }}"

  promote:
    name: Promote tested branch to main
    if: >-
      (github.event_name == 'pull_request_target' &&
       github.event.label.name == 'uat-passed' &&
       github.event.pull_request.base.ref == 'dev') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Open production PR after UAT sign-off
        env:
          GH_TOKEN: ${{ secrets.DEEDIMS_AUTOMATION_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          PR_HEAD: ${{ github.event.pull_request.head.ref }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          DISPATCH_BRANCH: ${{ github.event.inputs.change_branch }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            head_branch="$DISPATCH_BRANCH"
          else
            if [ "$PR_MERGED" != "true" ]; then
              echo 'UAT sign-off ignored: the change branch is not merged into dev yet.'
              exit 0
            fi
            head_branch="$PR_HEAD"
          fi

          if [ -z "$head_branch" ] || [ "$head_branch" = "main" ]; then
            echo 'No change branch requires production promotion.'
            exit 0
          fi

          if ! git ls-remote --exit-code --heads "https://github.com/$REPOSITORY.git" "$head_branch" >/dev/null 2>&1; then
            echo "Promotion rejected: branch $head_branch no longer exists."
            exit 1
          fi

          merged_in_dev=$(gh api \
            -H 'Accept: application/vnd.github+json' \
            "repos/$REPOSITORY/compare/dev...$head_branch" \
            --jq '.status')
          if [ "$merged_in_dev" != "identical" ] && [ "$merged_in_dev" != "behind" ]; then
            echo "Promotion rejected: $head_branch head is not contained in dev (status: $merged_in_dev)."
            exit 1
          fi

          existing=$(gh pr list --repo "$REPOSITORY" --base main --head "$head_branch" --state open --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            pr_number="$existing"
          else
            pr_url=$(gh pr create \
              --repo "$REPOSITORY" \
              --base main \
              --head "$head_branch" \
              --title "promote: $head_branch to production" \
              --body "Automated production promotion after explicit UAT sign-off in dev.")
            pr_number=${pr_url##*/}
          fi

          gh pr merge "$pr_number" --repo "$REPOSITORY" --auto --merge

  sync-dev:
    name: Synchronize production baseline to dev
    if: github.event_name == 'push' && github.ref_name == 'main'
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Open main-to-dev synchronization PR when needed
        env:
          GH_TOKEN: ${{ secrets.DEEDIMS_AUTOMATION_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          ahead=$(gh api "repos/$REPOSITORY/compare/dev...main" --jq '.ahead_by')
          if [ "$ahead" -eq 0 ]; then
            echo 'dev already contains the production baseline.'
            exit 0
          fi

          existing=$(gh pr list --repo "$REPOSITORY" --base dev --head main --state open --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            pr_number="$existing"
          else
            pr_url=$(gh pr create \
              --repo "$REPOSITORY" \
              --base dev \
              --head main \
              --title 'chore: synchronize production baseline to dev' \
              --body 'Automated synchronization after production deployment. This never promotes unrelated dev changes into main.')
            pr_number=${pr_url##*/}
          fi

          gh pr merge "$pr_number" --repo "$REPOSITORY" --auto --merge
