services:
  backend:
    build: ./backend
    environment:
      DATABASE_URL: "file:/data/dev.db"   # SQLite di named volume (persist)
      JWT_SECRET: "${JWT_SECRET:-dev-secret-change-me}"
      BOT_TOKEN: "${BOT_TOKEN:-}"          # kosongkan untuk mode API-only
      PORT: "3000"
      TZ: "Asia/Jakarta"
      RETENTION_DAYS: "14"
      CORS_ORIGIN: "${CORS_ORIGIN:-http://localhost:8080}"
      UPLOADS_DIR: "/data/uploads"        # foto menu di volume (persist)
      MAX_UPLOAD_MB: "5"
    volumes:
      - dimsum_db:/data
    ports:
      - "3100:3000"                        # host 3100 (3000 lokal dipakai layanan lain)
    restart: unless-stopped

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  dimsum_db:
