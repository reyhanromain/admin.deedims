services:
  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: "file:/data/dev.db"   # SQLite di named volume (persist)
      PORT: "3000"
      TZ: "Asia/Jakarta"
      RETENTION_DAYS: "14"
      CORS_ORIGIN: "${CORS_ORIGIN:-http://localhost:8080}"
      UPLOADS_DIR: "/data/uploads"        # foto menu di volume (persist)
      MAX_UPLOAD_MB: "5"
    volumes:
      - dimsum_db:/data
    ports:
      - "3100:3000"                        # host 3100 (3000 lokal dipakai layanan lain)
    restart: unless-stopped

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:2026.6.1
    user: "1000:1000"
    command: tunnel --config /etc/cloudflared/config.yml run
    depends_on:
      - frontend
    volumes:
      - ./cloudflared.yml:/etc/cloudflared/config.yml:ro
      - ${HOME}/.cloudflared/b5311bc4-b39a-4da0-ab79-4520e838b45e.json:/etc/cloudflared/b5311bc4-b39a-4da0-ab79-4520e838b45e.json:ro
    restart: unless-stopped

volumes:
  dimsum_db:
